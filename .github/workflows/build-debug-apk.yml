name: Build Debug APK

on:
  push:
    branches:
      - stage
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'stage'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleFullDebug

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" term/build.gradle | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload APK to release
        uses: softprops/action-gh-release@v1
        with:
          files: term/build/outputs/apk/full/debug/term-full-debug.apk
          tag_name: debug-${{ steps.version.outputs.timestamp }}
          name: Debug Build - ${{ steps.version.outputs.version }} (${{ steps.version.outputs.timestamp }})
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
